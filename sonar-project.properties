# SonarQube analysis configuration for the a2-react-aria monorepo.
# Analysed by the scanner service in docker-compose.sonarqube.yml.
#
# Coverage must be generated before scanning:
#   pnpm --filter @a2ra/core test:coverage

sonar.projectKey=a2-react-aria
sonar.projectName=A2 React Aria
sonar.projectVersion=1.0.0-preview

# --------------------------------------------------------------------------
# Source directories
# Production code + sample/demo projects. docs/ site is excluded.
# --------------------------------------------------------------------------
sonar.sources=\
  packages/core/src,\
  packages/cli/src,\
  apps/demo/web/app,\
  apps/demo/web/components,\
  apps/demo/web/hooks,\
  apps/demo/web/lib,\
  apps/demo/agent,\
  stories

# --------------------------------------------------------------------------
# Exclusions
# Build output, dependencies, generated files, and test files are all excluded
# from source analysis so only production code contributes to quality metrics.
# --------------------------------------------------------------------------
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.next/**,\
  **/coverage/**,\
  **/public/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/next-env.d.ts,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# --------------------------------------------------------------------------
# Coverage (TypeScript / JavaScript)
# Generated by: pnpm --filter @a2ra/core test:coverage
#               pnpm --filter @a2ra/cli  test:coverage
# Output location configured in vitest.config in each package.
# --------------------------------------------------------------------------
sonar.javascript.lcov.reportPaths=\
  packages/core/coverage/lcov.info,\
  packages/cli/coverage/lcov.info

# --------------------------------------------------------------------------
# Python (apps/demo/agent)
# --------------------------------------------------------------------------
sonar.python.version=3.12

# --------------------------------------------------------------------------
# General
# --------------------------------------------------------------------------
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
