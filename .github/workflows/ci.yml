name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo zricethezav/gitleaks:latest \
            dir --config .gitleaks.toml --no-banner --redact --exit-code 1 .

  build:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Lint Markdown
        run: pnpm lint:md

      - name: Type check (core)
        run: pnpm --filter @a2ra/core exec tsc --noEmit

      - name: Type check (cli)
        run: pnpm --filter @a2ra/cli exec tsc --noEmit

      - name: Verify registry is up to date
        run: |
          pnpm build:registry
          git diff --exit-code registry \
            || (echo "::error::registry/ is stale — run 'pnpm build:registry' and commit the result." && exit 1)

      - name: Install Playwright browsers
        run: pnpm --filter @a2ra/docs exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Build packages
        run: pnpm build
